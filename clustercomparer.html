<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cluster Comparer</title>
  <style>
    :root {
      --ink: #17211d;
      --muted: #65716b;
      --line: #d7ded9;
      --soft: #f4f7f5;
      --green: #13795b;
      --green-soft: #e5f4ed;
      --blue: #176b87;
      --blue-soft: #e4f2f7;
      --amber: #9a6700;
      --amber-soft: #fff3cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #fff;
      font: 14px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    button, input, select { font: inherit; cursor: pointer; }

    .topbar {
      min-height: 58px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-size: 17px; font-weight: 750; margin-right: 8px; }
    .button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 11px;
      border-radius: 6px;
      font-weight: 650;
    }
    .button.primary { background: var(--green); border-color: var(--green); color: #fff; }
    .folder-name { font-size: 12px; color: var(--muted); }
    .sep { color: var(--line); font-size: 20px; }
    .topbar label { font-size: 11px; font-weight: 700; color: var(--muted); margin: 0; }
    .topbar select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      min-width: 160px;
    }
    .topbar select:disabled { opacity: 0.4; cursor: default; }

    .workspace { padding: 20px; }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
      color: var(--muted);
    }
    .splash-icon { font-size: 40px; }
    .splash h2 { margin: 0; font-size: 18px; color: var(--ink); }
    .splash p { margin: 0; font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 1px 3px rgba(23,33,29,.06);
      display: flex;
      flex-direction: column;
    }
    .card-head {
      padding: 12px 14px 10px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      border-radius: 10px 10px 0 0;
    }
    .card-title { font-weight: 750; font-size: 14px; margin: 0 0 2px; }
    .card-desc { color: var(--muted); font-size: 12px; margin: 0; }

    .use-row {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }
    .use-label { font-size: 11px; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .use-slider { flex: 1; accent-color: var(--green); }
    .use-value { font-size: 13px; font-weight: 750; min-width: 36px; text-align: right; color: var(--green); }

    .pairs { padding: 10px 14px; display: grid; gap: 8px; flex: 1; }

    .pair {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      font-size: 12px;
    }
    .pair-label {
      padding: 4px 8px;
      background: var(--amber-soft);
      color: var(--amber);
      font-weight: 700;
      font-size: 11px;
    }
    .pair-row {
      padding: 5px 8px;
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .pair-row + .pair-row { border-top: 1px solid var(--line); }
    .tag {
      font-size: 10px;
      font-weight: 750;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .tag-a { background: var(--amber-soft); color: var(--amber); }
    .tag-c { background: var(--blue-soft); color: var(--blue); }
    .pair-nodes { color: var(--muted); flex: 1; }
    .pair-e4 { font-weight: 700; color: var(--ink); }

    .card-goal {
      padding: 8px 14px;
      border-top: 1px solid var(--line);
      background: var(--green-soft);
      font-size: 12px;
      color: var(--green);
      font-weight: 700;
      border-radius: 0 0 10px 10px;
    }

    .empty { color: var(--muted); padding: 40px 0; text-align: center; grid-column: 1/-1; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Cluster Comparer</div>
    <button id="loadBtn" class="button primary">Load triangles</button>
    <input id="fileInput" type="file" accept=".csv" multiple style="display:none">
    <span id="folderName" class="folder-name"></span>
    <span class="sep">/</span>
    <label>Sector</label>
    <select id="sectorSel" disabled></select>
    <span class="sep">/</span>
    <label>Scenario</label>
    <select id="scenarioSel" disabled></select>
  </header>

  <main class="workspace">
    <div id="grid"></div>
  </main>

  <script>
    let triangles = {};
    let sectors = {};
    let usePercents = {};

    // --- CSV parser ---
    function parseCSV(text, filename) {
      const id = filename.replace(/\.csv$/i, '');
      const lines = text.split('\n').map(l => l.trimEnd());
      const dataLines = lines.filter(l => !l.split(';').every(c => !c.trim()));

      if (!dataLines.length) return null;

      // Detect format: triangle format has 'c;activity' somewhere; clustermaker has cluster name in col 0 of first row
      const isTriangle = dataLines.some(l => { const c = l.split(';'); return c[1] === 'c' && c[2] === 'activity'; });

      if (isTriangle) {
        let name = '', desc = '', goal = '';
        const pairs = [];
        let currentA = null;
        for (const line of dataLines) {
          const cols = line.split(';');
          const [label, e0, e1, e2, e3, e4] = cols;
          if (e0 === 'c' && e1 === 'activity' && e4 && e4.trim().startsWith('goal')) {
            goal = e4.trim();
          } else if (e0 === 'c' && e1 === 'activity') {
            const parts = label.split('—').map(p => p.trim());
            name = parts[0] || id; desc = parts[1] || '';
          } else if (e0 === 'a') {
            currentA = { label: label.trim(), e2: e2.trim(), e3: e3.trim(), e4: e4.trim() };
          } else if ((e0 === 'c' || e0 === '') && e1 === 'mode' && currentA) {
            pairs.push({ label: currentA.label, a: { e2: currentA.e2, e3: currentA.e3, e4: currentA.e4 }, c: { e2: e2.trim(), e3: e3.trim(), e4: e4.trim() } });
            currentA = null;
          }
        }
        if (!name) return null;
        return { id, name, desc, pairs, records: [], goal };
      } else {
        // Clustermaker flat format: cluster name in col 0 of first row
        const firstCols = dataLines[0].split(';');
        const name = firstCols[0].trim();
        if (!name) return null;
        const records = dataLines.map(l => {
          const c = l.split(';');
          return { e0: c[1]?.trim(), e1: c[2]?.trim(), e2: c[3]?.trim(), e3: c[4]?.trim(), e4: c[5]?.trim(), e5: c[6]?.trim(), e6: c[7]?.trim() };
        }).filter(r => r.e0);
        return { id, name, desc: '', pairs: [], records, goal: '' };
      }
    }

    // infer sector from filename: triangle_balance1 → Balance
    function sectorFromId(id) {
      const m = id.match(/^(?:triangle_)?([a-z]+)\d*$/i);
      return m ? m[1].charAt(0).toUpperCase() + m[1].slice(1) : 'Other';
    }

    function buildSectors(loaded) {
      const byType = {};
      for (const [id, t] of Object.entries(loaded)) {
        const sec = sectorFromId(id);
        if (!byType[sec]) byType[sec] = {};
        byType[sec][t.name] = { [id]: 100 };
      }
      const all = {};
      Object.keys(loaded).forEach(id => { all[id] = 100; });
      return { 'All': { 'All triangles': all }, ...byType };
    }

    // --- UI ---
    function populateSelectors() {
      const sectorSel = document.getElementById('sectorSel');
      const scenarioSel = document.getElementById('scenarioSel');
      sectorSel.innerHTML = '';
      Object.keys(sectors).forEach(s => {
        const o = document.createElement('option');
        o.value = s; o.textContent = s;
        sectorSel.appendChild(o);
      });
      sectorSel.disabled = false;
      scenarioSel.disabled = false;
      populateScenarios();
    }

    function populateScenarios() {
      const sector = document.getElementById('sectorSel').value;
      const scenarioSel = document.getElementById('scenarioSel');
      scenarioSel.innerHTML = '';
      Object.keys(sectors[sector] || {}).forEach(sc => {
        const o = document.createElement('option');
        o.value = sc; o.textContent = sc;
        scenarioSel.appendChild(o);
      });
      usePercents = {};
      renderGrid();
    }

    function renderGrid() {
      const sector = document.getElementById('sectorSel').value;
      const scenario = document.getElementById('scenarioSel').value;
      const defaults = sectors[sector]?.[scenario] || {};

      Object.entries(defaults).forEach(([id, val]) => {
        if (usePercents[id] === undefined) usePercents[id] = val;
      });

      const grid = document.getElementById('grid');

      if (!Object.keys(triangles).length) {
        grid.innerHTML = `<div class="splash">
          <div class="splash-icon">📂</div>
          <h2>No triangles loaded</h2>
          <p>Click <strong>Load triangles folder</strong> to pick your triangles directory.</p>
        </div>`;
        return;
      }

      const ids = Object.keys(defaults).filter(id => triangles[id]);
      grid.innerHTML = `<div class="grid">${ids.length
        ? ids.map(id => cardHTML(id)).join('')
        : '<div class="empty">No triangles in this scenario.</div>'
      }</div>`;

      grid.querySelectorAll('.use-slider').forEach(slider => {
        slider.addEventListener('input', e => {
          const id = e.target.dataset.id;
          usePercents[id] = Number(e.target.value);
          grid.querySelector(`.use-value[data-id="${id}"]`).textContent = usePercents[id] + '%';
        });
      });
    }

    function cardHTML(id) {
      const t = triangles[id];
      const pct = usePercents[id] ?? 100;

      let bodyHTML;
      if (t.pairs.length) {
        bodyHTML = t.pairs.map(p => `
          <div class="pair">
            <div class="pair-label">${p.label}</div>
            <div class="pair-row">
              <span class="tag tag-a">a</span>
              <span class="pair-nodes">${p.a.e2} → ${p.a.e3}</span>
              <span class="pair-e4">${p.a.e4}</span>
            </div>
            <div class="pair-row">
              <span class="tag tag-c">c</span>
              <span class="pair-nodes">${p.c.e2} → ${p.c.e3}</span>
              <span class="pair-e4">${p.c.e4}</span>
            </div>
          </div>`).join('');
      } else {
        bodyHTML = t.records.map(r => `
          <div class="pair">
            <div class="pair-row">
              <span class="tag tag-${r.e0}">${r.e0}</span>
              <span class="pair-nodes">${r.e2} → ${r.e3}</span>
              <span class="pair-e4">${r.e4}</span>
              <span style="color:var(--muted);font-size:11px;margin-left:4px">${r.e1}</span>
            </div>
          </div>`).join('');
      }

      return `
        <div class="card">
          <div class="card-head">
            <p class="card-title">${t.name}</p>
            ${t.desc ? `<p class="card-desc">${t.desc}</p>` : ''}
          </div>
          <div class="use-row">
            <span class="use-label">USE %</span>
            <input class="use-slider" type="range" min="0" max="100" value="${pct}" data-id="${id}">
            <span class="use-value" data-id="${id}">${pct}%</span>
          </div>
          <div class="pairs">${bodyHTML}</div>
          ${t.goal ? `<div class="card-goal">&#8679; ${t.goal}</div>` : ''}
        </div>`;
    }

    // --- Load files ---
    document.getElementById('loadBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', async e => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const loaded = {};
      for (const file of files) {
        const text = await file.text();
        const t = parseCSV(text, file.name);
        if (t) loaded[t.id] = t;
      }
      const parsed = Object.keys(loaded).length;
      const failed = files.length - parsed;
      document.getElementById('folderName').textContent = `${parsed} triangle${parsed !== 1 ? 's' : ''} loaded` + (failed ? ` (${failed} skipped)` : '');
      triangles = loaded;
      sectors = buildSectors(loaded);
      populateSelectors();
      e.target.value = '';
    });

    document.getElementById('sectorSel').addEventListener('change', populateScenarios);
    document.getElementById('scenarioSel').addEventListener('change', renderGrid);

    renderGrid();
  </script>
</body>
</html>
