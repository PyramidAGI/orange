<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dice — combinations</title>
  <style>
    :root {
      --ink: #17211d;
      --muted: #65716b;
      --line: #d7ded9;
      --soft: #f4f7f5;
      --green: #13795b;
      --green-soft: #e5f4ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--ink);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 36px;
    }

    /* ── load bar ── */
    .load-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .load-bar label {
      cursor: pointer;
      color: var(--green);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── dice ── */
    .dice { display: flex; gap: 24px; }
    .die {
      width: 80px; height: 80px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 10px;
      gap: 4px;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform .1s;
    }
    .die.rolling { animation: shake .35s ease; }
    @keyframes shake {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(-12deg) scale(1.08); }
      50%      { transform: rotate(10deg) scale(1.05); }
      75%      { transform: rotate(-6deg); }
    }
    .dot {
      border-radius: 50%;
      background: var(--ink);
      width: 100%; height: 100%;
      visibility: hidden;
    }
    .dot.on { visibility: visible; }

    /* ── button ── */
    button {
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 32px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: .3px;
    }
    button:disabled { opacity: .35; cursor: default; }
    button:not(:disabled):active { transform: translateY(1px); }

    /* ── result ── */
    .result {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity .3s;
    }
    .result.show { opacity: 1; }
    .concept {
      font-size: 32px;
      font-weight: 750;
      letter-spacing: -.5px;
    }
    .quark {
      font: 14px/1 ui-monospace, Consolas, monospace;
      color: var(--green);
      background: var(--green-soft);
      padding: 5px 12px;
      border-radius: 5px;
    }
    .entry-num {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .related {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: center;
      max-width: 480px;
    }
    .related-row { font-size: 13px; }
    .via-quark {
      font: 12px/1 ui-monospace, Consolas, monospace;
      color: var(--green);
    }
    .via-concepts { color: var(--ink); }

    /* ── search ── */
    .search-bar {
      position: relative;
      width: 260px;
    }
    .search-bar input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      font: 15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      outline: none;
      color: var(--ink);
    }
    .search-bar input:focus { border-color: var(--green); }
    .search-bar input:disabled { opacity: .35; }
    .suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(23,33,29,.1);
      overflow: hidden;
      z-index: 10;
    }
    .suggestions.open { display: block; }
    .suggestion-item {
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .suggestion-item:hover { background: var(--green-soft); color: var(--green); }
  </style>
</head>
<body>

  <div class="load-bar">
    <label>Load combinations.csv<input type="file" accept=".csv" id="fileInput" style="display:none"></label>
    <span id="fileStatus">— no file loaded</span>
  </div>

  <div class="dice">
    <div class="die" id="d1"></div>
    <div class="die" id="d2"></div>
    <div class="die" id="d3"></div>
  </div>

  <button id="btn" disabled>Roll</button>

  <div class="search-bar">
    <input id="searchInput" placeholder="Search concept..." disabled autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="result" id="result">
    <div class="concept" id="concept"></div>
    <div class="quark"   id="quark"></div>
    <div class="entry-num" id="enum"></div>
    <div class="related" id="related"></div>
  </div>

  <script>
    let entries = [];

    document.getElementById('fileInput').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      entries = text.split('\n')
        .map(l => l.trim())
        .filter(l => l && l.includes(';'))
        .map(l => { const [concept, quark] = l.split(';'); return [concept.trim(), quark.trim()]; });
      const uniqueConcepts = new Set(entries.map(e => e[0])).size;
      document.getElementById('fileStatus').textContent = `${entries.length} rows loaded · ${uniqueConcepts} unique concepts`;
      document.getElementById('btn').disabled = false;
      document.getElementById('searchInput').disabled = false;
      e.target.value = '';
    });

    // dot positions (0–8) for each die face
    const faces = {
      1: [4],
      2: [2, 6],
      3: [2, 4, 6],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function renderDie(el, val) {
      el.innerHTML = Array.from({length: 9}, (_, i) =>
        `<div class="dot ${faces[val].includes(i) ? 'on' : ''}"></div>`
      ).join('');
    }

    function showConcept(concept, idx) {
      const quarks = entries.filter(e => e[0] === concept).map(e => e[1]);
      const i = idx !== undefined ? idx : entries.findIndex(e => e[0] === concept);
      document.getElementById('concept').textContent = concept;
      document.getElementById('quark').textContent   = quarks.join('  ·  ');
      document.getElementById('enum').textContent    = `entry ${i + 1} of ${entries.length}`;
      const related = quarks.map(q => ({
        quark: q,
        concepts: [...new Set(entries.filter(e => e[1] === q && e[0] !== concept).map(e => e[0]))]
      })).filter(r => r.concepts.length > 0);
      document.getElementById('related').innerHTML = related.map(r =>
        `<div class="related-row"><span class="via-quark">via ${r.quark}:</span> <span class="via-concepts">${r.concepts.join('  ·  ')}</span></div>`
      ).join('');
      document.getElementById('result').classList.add('show');
    }

    function roll() {
      const d1 = Math.ceil(Math.random() * 6);
      const d2 = Math.ceil(Math.random() * 6);
      const d3 = Math.ceil(Math.random() * 6);
      const die1 = document.getElementById('d1');
      const die2 = document.getElementById('d2');
      const die3 = document.getElementById('d3');
      document.getElementById('result').classList.remove('show');
      die1.classList.add('rolling');
      die2.classList.add('rolling');
      die3.classList.add('rolling');
      setTimeout(() => {
        renderDie(die1, d1);
        renderDie(die2, d2);
        renderDie(die3, d3);
        die1.classList.remove('rolling');
        die2.classList.remove('rolling');
        die3.classList.remove('rolling');
        const idx = ((d1 - 1) * 36 + (d2 - 1) * 6 + (d3 - 1)) % entries.length;
        showConcept(entries[idx][0], idx);
      }, 350);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      const sugEl = document.getElementById('suggestions');
      if (!q) { sugEl.classList.remove('open'); return; }
      const concepts = [...new Set(entries.map(e => e[0]))];
      const matches = concepts.filter(c => c.toLowerCase().includes(q));
      if (!matches.length) { sugEl.classList.remove('open'); return; }
      sugEl.innerHTML = matches.slice(0, 7).map(c =>
        `<div class="suggestion-item">${c}</div>`
      ).join('');
      sugEl.classList.add('open');
      sugEl.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => {
          showConcept(item.textContent);
          e.target.value = item.textContent;
          sugEl.classList.remove('open');
        });
      });
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-bar')) document.getElementById('suggestions').classList.remove('open');
    });

    // initialise dice faces
    renderDie(document.getElementById('d1'), 1);
    renderDie(document.getElementById('d2'), 1);
    renderDie(document.getElementById('d3'), 1);
    document.getElementById('btn').addEventListener('click', roll);
  </script>
</body>
</html>
