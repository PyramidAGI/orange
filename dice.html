<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dice — combinations</title>
  <style>
    :root {
      --ink: #17211d;
      --muted: #65716b;
      --line: #d7ded9;
      --soft: #f4f7f5;
      --green: #13795b;
      --green-soft: #e5f4ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--ink);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 36px;
    }

    /* ── dice ── */
    .dice { display: flex; gap: 24px; }
    .die {
      width: 80px; height: 80px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 10px;
      gap: 4px;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform .1s;
    }
    .die.rolling { animation: shake .35s ease; }
    @keyframes shake {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(-12deg) scale(1.08); }
      50%      { transform: rotate(10deg) scale(1.05); }
      75%      { transform: rotate(-6deg); }
    }
    .dot {
      border-radius: 50%;
      background: var(--ink);
      width: 100%; height: 100%;
      visibility: hidden;
    }
    .dot.on { visibility: visible; }

    /* ── button ── */
    button {
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 32px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: .3px;
    }
    button:active { transform: translateY(1px); }

    /* ── result ── */
    .result {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity .3s;
    }
    .result.show { opacity: 1; }
    .concept {
      font-size: 32px;
      font-weight: 750;
      letter-spacing: -.5px;
    }
    .quark {
      font: 14px/1 ui-monospace, Consolas, monospace;
      color: var(--green);
      background: var(--green-soft);
      padding: 5px 12px;
      border-radius: 5px;
    }
    .entry-num {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="dice">
    <div class="die" id="d1"></div>
    <div class="die" id="d2"></div>
    <div class="die" id="d3"></div>
  </div>

  <button id="btn">Roll</button>

  <div class="result" id="result">
    <div class="concept" id="concept"></div>
    <div class="quark"   id="quark"></div>
    <div class="entry-num" id="enum"></div>
  </div>

  <script>
    const entries = [
      ["plant","nature"],["plant","food"],["house","loc"],["house","container"],
      ["headphones","channel"],["headphones","tool"],["headphones","transducer"],
      ["dog","animate"],["dog","nature"],["fear","problem"],["fear","conflict"],
      ["fear","emo"],["organization","organization"],["organization","group"],
      ["sound","transducer"],["sound","energy"],["branch","pattern"],
      ["branch","group"],["branch","fork"],["stem","nature"],["stem","support"],
      ["music","pattern"],["music","sequence"],["music","stat sound"],
      ["agression","conflict"],["agression","dominate"],["salary","transaction"],
      ["salary","reward"],["clock","time"],["clock","event"],["bird","animate"],
      ["bird","nature"],["daughter","bond"],["daughter","group"],
      ["daughter","kinship"],["artist","emo"],["artist","pattern"],
      ["water","nature"],["water","bond"],["water","stat liquid"],
      ["computer","data"],["computer","tool"],["health","food"],
      ["health","activity"],["health","vitality"],["robot","transducer"],
      ["robot","tool"],["wristwatch","time"],["wristwatch","sequence"],
      ["grandma","kinship"],["grandma","bond"],["road","transport"],
      ["road","loc"],["fight","conflict"],["fight","force"],["sleep","time"],
      ["sleep","vitality"],["explosion","expand"],["explosion","energy"],
      ["microphone","stat sound"],["microphone","transducer"],["star","nature"],
      ["star","radiation"],["sun","energy"],["sun","radiation"],
      ["cloud","nature"],["cloud","expand"],["cloud","stat vapor"],
      ["book","container"],["book","tool"],["football","activity"],
      ["football","loc"],["lawn","nature"],["lawn","loc"],
      ["president","organization"],["president","group"],["bottle","container"],
      ["bottle","stat liquid"],["insecurity","emo"],["insecurity","problem"],
      ["earth","nature"],["earth","loc"],["heat","energy"],["heat","radiation"],
      ["cold","nature"],["cold","energy"],["cold","stat cold"],
      ["obstacle","problem"],["obstacle","solve"],["train","transport"],
      ["train","loc"],["electricity","energy"],["electricity","transducer"],
      ["car","transport"],["car","drive"],["motor","energy"],["motor","force"],
      ["lamp","energy"],["lamp","radiation"],["dirt","nature"],["dirt","loc"],
      ["equipment","tool"],["equipment","container"],["surface","stat size"],
      ["surface","loc"],["surface","shield"],["product","tool"],["product","val"],
      ["pressure","expand"],["pressure","compress"],["pressure","force"],
      ["pump","transducer"],["pump","energy"],["pump","stat liquid"],
      ["hose","stat liquid"],["hose","channel"],["cloth","nature"],
      ["cloth","pattern"],["cloth","stat soft"],["scratch","activity"],
      ["scratch","fix"],["scratch","stat rough"],["tree","nature"],
      ["tree","trunk"],["sponge","nature"],["sponge","stat liquid"],
      ["sponge","stat soft"],["mineral","nature"],["mineral","stat rough"],
      ["grasper","tool"],["grasper","animate"],["grasper","force"],
      ["arm","support"],["arm","force"],["leg","support"],["leg","animate"],
      ["leg","force"],["sad","emo"],["sad","val"],["battery","energy"],
      ["battery","transducer"],["city","loc"],["city","organization"],
      ["city","group"],["leaf","nature"],["leaf","vitality"],["leaf","plant"],
      ["servo","drive"],["servo","transducer"],["servo","force"],
      ["color","pattern"],["color","radiation"],["light","energy"],
      ["light","radiation"],["love","emo"],["love","stat soft"],["love","bond"],
      ["wind","nature"],["wind","force"],["sick leave","time"],
      ["sick leave","event"],["sick leave","vitality"],["needle","tool"],
      ["needle","fix"],["thorn","plant"],["thorn","nature"],
      ["thorn","stat rough"],["drone","tool"],["drone","transport"],
      ["drone","machine"],["fir tree needle","plant"],
      ["fir tree needle","nature"],["shrub","plant"],["shrub","nature"],
      ["path","loc"],["path","channel"],["sick","vitality"],["sick","problem"],
      ["lead","tool"],["lead","stat size"],["knife","tool"],["knife","fork"],
      ["wheel","transport"],["wheel","tool"],["radar","pattern"],
      ["radar","tool"],["radar","transducer"],["war","conflict"],
      ["war","dominate"],["cat","animate"],["cat","nature"],["flower","plant"],
      ["flower","nature"],["soil","nature"],["soil","plant"],["soil","support"],
      ["procedure","sequence"],["procedure","time"],["state","stat"],
      ["state","loc"],["low","stat low"],["high","stat high"],
      ["fast","stat fast"],["slow","stat slow"],["full","stat full"],
      ["empty","stat empty"],["broken","stat broken"],["broken","problem"],
      ["hot","stat hot"],["hot","energy"],["dry","stat dry"],
      ["heavy","stat heavy"],["heavy","force"],["database","data"],
      ["database","container"]
    ];

    // dot positions (0–8) for each die face
    const faces = {
      1: [4],
      2: [2, 6],
      3: [2, 4, 6],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function renderDie(el, val) {
      el.innerHTML = Array.from({length: 9}, (_, i) =>
        `<div class="dot ${faces[val].includes(i) ? 'on' : ''}"></div>`
      ).join('');
    }

    function roll() {
      const d1 = Math.ceil(Math.random() * 6);
      const d2 = Math.ceil(Math.random() * 6);
      const d3 = Math.ceil(Math.random() * 6);

      const die1 = document.getElementById('d1');
      const die2 = document.getElementById('d2');
      const die3 = document.getElementById('d3');
      const result = document.getElementById('result');

      result.classList.remove('show');
      die1.classList.add('rolling');
      die2.classList.add('rolling');
      die3.classList.add('rolling');

      setTimeout(() => {
        renderDie(die1, d1);
        renderDie(die2, d2);
        renderDie(die3, d3);
        die1.classList.remove('rolling');
        die2.classList.remove('rolling');
        die3.classList.remove('rolling');

        const idx = ((d1 - 1) * 36 + (d2 - 1) * 6 + (d3 - 1)) % entries.length;
        const concept = entries[idx][0];
        const quarks  = entries.filter(e => e[0] === concept).map(e => e[1]);
        document.getElementById('concept').textContent = concept;
        document.getElementById('quark').textContent   = quarks.join('  ·  ');
        document.getElementById('enum').textContent    = `entry ${idx + 1} of ${entries.length}`;
        result.classList.add('show');
      }, 350);
    }

    // initialise dice faces
    renderDie(document.getElementById('d1'), 1);
    renderDie(document.getElementById('d2'), 1);
    renderDie(document.getElementById('d3'), 1);
    document.getElementById('btn').addEventListener('click', roll);
  </script>
</body>
</html>
